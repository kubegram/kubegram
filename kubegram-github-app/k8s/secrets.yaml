apiVersion: v1
kind: Secret
metadata:
  name: github-app-secrets
  namespace: kubegram
  labels:
    app: kubegram-github-app
    component: github-integration
type: Opaque
data:
  # Base64 encoded values - replace with actual values
  app-id: <BASE64_ENCODED_GITHUB_APP_ID>
  private-key: <BASE64_ENCODED_GITHUB_PRIVATE_KEY>
  webhook-secret: <BASE64_ENCODED_WEBHOOK_SECRET>
  client-id: <BASE64_ENCODED_GITHUB_CLIENT_ID>
  client-secret: <BASE64_ENCODED_GITHUB_CLIENT_SECRET>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: github-app-config
  namespace: kubegram
  labels:
    app: kubegram-github-app
    component: github-integration
data:
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"
  CORS_ORIGINS: "https://github.com"
  KUBEGRAM_EVENT_BUS_URL: "http://kubegram-server:8090"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "100"
  HEALTH_CHECK_INTERVAL: "30000"