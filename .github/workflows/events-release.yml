name: Release events

on:
  push:
    branches:
      - main
    paths:
      - 'events/**'

jobs:
  release:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@kubegram'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: make ci-install-events

      - name: Type check
        run: make ci-typecheck-events

      - name: Lint code
        run: make ci-lint-events

      - name: Run tests
        run: make ci-test-events

      - name: Build
        run: make ci-build-events

      - name: Verify build output
        run: make ci-verify-build-events

      - name: Check if version changed
        id: version-check
        working-directory: events
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current-version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if npm view @kubegram/events@$CURRENT_VERSION version --registry https://registry.npmjs.org > /dev/null 2>&1; then
            echo "Version $CURRENT_VERSION already exists on npm"
            echo "should-publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version $CURRENT_VERSION is new, will publish"
            echo "should-publish=true" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.version-check.outputs.should-publish == 'true'
        run: make ci-publish-events
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.version-check.outputs.should-publish == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          tag_name: events/v${{ steps.version-check.outputs.current-version }}
          release_name: events v${{ steps.version-check.outputs.current-version }}
          body: |
            ## @kubegram/events v${{ steps.version-check.outputs.current-version }}

            ### Installation
            ```bash
            npm install @kubegram/events@${{ steps.version-check.outputs.current-version }}
            ```
          draft: false
          prerelease: false

      - name: Skip release notification
        if: steps.version-check.outputs.should-publish == 'false'
        run: |
          echo "Skipping release - version ${{ steps.version-check.outputs.current-version }} already exists"
