name: PR Validation - kubegram-server

on:
  pull_request:
    branches:
      - main
    paths:
      - 'kubegram-server/**'

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kubegram-server
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run ESLint
        run: bun run lint

      - name: Run TypeScript check
        run: bun run typecheck

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kubegram-server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kubegram_test
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p ${{ job.services.postgres.ports[5432] }}; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL ($i/30)..."
            sleep 1
          done

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            if redis-cli -h localhost -p ${{ job.services.redis.ports[6379] }} ping | grep -q PONG; then
              echo "Redis is ready"
              break
            fi
            echo "Waiting for Redis ($i/30)..."
            sleep 1
          done

      - name: Create .env.test
        run: |
          cat > .env.test << EOF
          NODE_ENV=test
          PORT=8090
          APP_URL=http://localhost:8090
          CORS_ORIGIN=http://localhost:3000
          DATABASE_URL=postgresql://postgres:postgres@localhost:${{ job.services.postgres.ports[5432] }}/kubegram_test
          REDIS_HOST=localhost
          REDIS_PORT=${{ job.services.redis.ports[6379] }}
          REDIS_DB=1
          ENABLE_HA=false
          JWT_SECRET=test-secret-key-for-testing-only
          GITHUB_CLIENT_ID=test_github_client_id
          GITHUB_CLIENT_SECRET=test_github_client_secret
          GOOGLE_CLIENT_ID=test_google_client_id
          GOOGLE_CLIENT_SECRET=test_google_client_secret
          KUBERAG_URL=http://localhost:8665/graphql
          INTERNAL_SECRET=test-internal-secret-for-testing
          EOF

      - name: Initialize test database schema
        run: |
          PGPASSWORD=postgres psql -h localhost -p ${{ job.services.postgres.ports[5432] }} -U postgres -d kubegram_test -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          PGPASSWORD=postgres psql -h localhost -p ${{ job.services.postgres.ports[5432] }} -U postgres -d kubegram_test -f test/fixtures/schema.sql

      - name: Load test fixtures
        run: |
          for fixture in test/fixtures/*.sql; do
            PGPASSWORD=postgres psql -h localhost -p ${{ job.services.postgres.ports[5432] }} -U postgres -d kubegram_test -f "$fixture" || true
          done

      - name: Run integration tests
        run: bun test --run src/__tests__

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
          retention-days: 7

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kubegram-server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kubegram_test
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright
        run: bunx playwright install --with-deps chromium

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p ${{ job.services.postgres.ports[5432] }}; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL ($i/30)..."
            sleep 1
          done

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            if redis-cli -h localhost -p ${{ job.services.redis.ports[6379] }} ping | grep -q PONG; then
              echo "Redis is ready"
              break
            fi
            echo "Waiting for Redis ($i/30)..."
            sleep 1
          done

      - name: Create .env.test
        run: |
          cat > .env.test << EOF
          NODE_ENV=test
          PORT=8090
          APP_URL=http://localhost:8090
          CORS_ORIGIN=http://localhost:3000
          DATABASE_URL=postgresql://postgres:postgres@localhost:${{ job.services.postgres.ports[5432] }}/kubegram_test
          REDIS_HOST=localhost
          REDIS_PORT=${{ job.services.redis.ports[6379] }}
          REDIS_DB=1
          ENABLE_HA=false
          JWT_SECRET=test-secret-key-for-testing-only
          GITHUB_CLIENT_ID=test_github_client_id
          GITHUB_CLIENT_SECRET=test_github_client_secret
          GOOGLE_CLIENT_ID=test_google_client_id
          GOOGLE_CLIENT_SECRET=test_google_client_secret
          KUBERAG_URL=http://localhost:8665/graphql
          INTERNAL_SECRET=test-internal-secret-for-testing
          EOF

      - name: Initialize test database schema
        run: |
          PGPASSWORD=postgres psql -h localhost -p ${{ job.services.postgres.ports[5432] }} -U postgres -d kubegram_test -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          PGPASSWORD=postgres psql -h localhost -p ${{ job.services.postgres.ports[5432] }} -U postgres -d kubegram_test -f test/fixtures/schema.sql

      - name: Load test fixtures
        run: |
          for fixture in test/fixtures/*.sql; do
            PGPASSWORD=postgres psql -h localhost -p ${{ job.services.postgres.ports[5432] }} -U postgres -d kubegram_test -f "$fixture" || true
          done

      - name: Start dev server
        run: bun run dev &
        env:
          NODE_ENV: development

      - name: Wait for server to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8090/api/public/v1/healthz/live > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Server failed to start"
              exit 1
            fi
            sleep 2
          done

      - name: Run E2E tests
        run: bunx playwright test --reporter=html
        continue-on-error: true

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: |
            test-results/
            playwright-report/
            test-results/e2e/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kubegram-server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            --build-arg NODE_ENV=test \
            -t kubegram-server:test \
            .
