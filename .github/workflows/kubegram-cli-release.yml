name: Release kubegram-cli

on:
  push:
    tags:
      - 'kubegram-cli/v*'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/kubegram-cli

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # GoReleaser uploads release assets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for GoReleaser changelog generation

      - name: Set up Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: kubegram-cli/go.sum

      - name: Create semver tag alias
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          SEMVER="v${TAG#kubegram-cli/v}"
          git tag -f "$SEMVER"
          echo "tag=$SEMVER" >> $GITHUB_OUTPUT

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --config kubegram-cli/.goreleaser.yaml --clean --skip=homebrew
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.tag }}

      - name: Update Homebrew formula
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION_NUM="${VERSION#v}"

          CHECKSUMS=$(gh release download "$VERSION" \
            --repo kubegram/kubegram \
            --pattern "kubegram_checksums.txt" \
            --output -)

          get_sha() { echo "$CHECKSUMS" | grep "$1" | awk '{print $1}'; }

          git clone \
            "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/kubegram/homebrew-tap.git" \
            tap

          VERSION_NUM="$VERSION_NUM" \
          BASE="https://github.com/kubegram/kubegram/releases/download/kubegram-cli%2F${VERSION}" \
          DARWIN_AMD64="$(get_sha "kubegram_${VERSION_NUM}_darwin_amd64.tar.gz")" \
          DARWIN_ARM64="$(get_sha "kubegram_${VERSION_NUM}_darwin_arm64.tar.gz")" \
          LINUX_AMD64="$(get_sha  "kubegram_${VERSION_NUM}_linux_amd64.tar.gz")" \
          LINUX_ARM64="$(get_sha  "kubegram_${VERSION_NUM}_linux_arm64.tar.gz")" \
          python3 .github/scripts/update-homebrew.py

          cd tap
          git remote set-url origin \
            "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/kubegram/homebrew-tap.git"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/kubegram.rb
          git commit -m "Update kubegram to ${VERSION_NUM}"
          git push
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#kubegram-cli/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: kubegram-cli
          file: kubegram-cli/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  publish-go-package:
    name: Publish to Go Package Registry
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read

    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#kubegram-cli/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Publish to proxy.golang.org
        run: |
          # Trigger Go proxy to cache the new version
          # GOPROXY=proxy.golang.org ensures we use the public proxy
          go list -m github.com/kubegram/kubegram-cli@v${{ steps.version.outputs.version }}
        env:
          GOPROXY: proxy.golang.org
