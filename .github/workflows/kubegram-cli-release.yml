name: Release kubegram-cli

on:
  push:
    branches:
      - main
    paths:
      - 'kubegram-cli/**'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/kubegram-cli

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # push git tag + GoReleaser uploads release assets
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should-release: ${{ steps.version-check.outputs.should-release }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for GoReleaser changelog generation

      - name: Set up Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: kubegram-cli/go.sum

      - name: Read version
        id: version
        run: |
          VERSION=$(cat kubegram-cli/VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=kubegram-cli/v${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if version already released
        id: version-check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" --repo kubegram/kubegram > /dev/null 2>&1; then
            echo "Version $TAG already released, skipping"
            echo "should-release=false" >> $GITHUB_OUTPUT
          else
            echo "Version $TAG is new, will release"
            echo "should-release=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push git tag
        if: steps.version-check.outputs.should-release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Run GoReleaser
        if: steps.version-check.outputs.should-release == 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --config kubegram-cli/.goreleaser.yaml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # GoReleaser strips "kubegram-cli/" prefix via git.tag_prefix → version 1.0.0
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.tag }}

      - name: Skip release notification
        if: steps.version-check.outputs.should-release == 'false'
        run: echo "Skipping — ${{ steps.version.outputs.tag }} already released"

  build-and-push-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.should-release == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ needs.release.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: kubegram-cli
          file: kubegram-cli/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.release.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  publish-go-package:
    name: Publish to Go Package Registry
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.should-release == 'true'
    permissions:
      contents: read

    steps:
      - name: Set up Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Publish to proxy.golang.org
        run: |
          # Trigger Go proxy to cache the new version
          # GOPROXY=proxy.golang.org ensures we use the public proxy
          go list -m github.com/kubegram/kubegram-cli@v${{ needs.release.outputs.version }}
        env:
          GOPROXY: proxy.golang.org
