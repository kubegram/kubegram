apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubegram-sidecar.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubegram-sidecar.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubegram-sidecar.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubegram-sidecar.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kubegram-sidecar.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: webhook
          image: {{ include "kubegram-sidecar.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --mode=webhook
            - --webhook-addr={{ .Values.webhook.addr }}
            - --tls-cert=/tls/tls.crt
            - --tls-key=/tls/tls.key
          env:
            - name: KUBEGRAM_SIDECAR_IMAGE
              value: {{ include "kubegram-sidecar.image" . }}
          ports:
            - name: webhook
              containerPort: 8443
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tls
          secret:
            secretName: {{ include "kubegram-sidecar.tlsSecret" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
